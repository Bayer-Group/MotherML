cv:
  cv_type: tanimoto_grouping
  n_splits: 5
  parameters:
    similarity_threshold: 0.4
feature_generation:
  chemical_descriptors:
    descriptor_list: null
    descriptor_prefix: rdkit_
    omit_prefixes:
    - fr_
    - FpDensity
  fingerprints:
  - MorganFP:
      fpSize: 1024
      includeChirality: false
      radius: 2
  maccs: true
input:
  group_col: std_smiles
  input_file: test/data/freesolv_train.csv
  input_separator: ','
  structure_col: smiles
  target_columns:
  - expt
model:
  algorithm: catboost
  categorical_features:
