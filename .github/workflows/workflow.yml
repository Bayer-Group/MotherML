name: Workflow for model testing and release

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
env:
  PYTHON_VERSION: "3.12"
jobs:
  style:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v6

      - name: Setup uv environment 📚
        id: setup-uv-env
        uses: ./.github/actions/setup-uv-env
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          install-args: "--extra report --extra rna --extra tabpfn"

      # - name: Run type checks #needs a lot of type fixing
      #   run: |
      #     uv run poe check-types
      - name: Run style checks
        run: |
          uv run poe check-style

      - name: Run linter
        run: |
          uv run poe check-lint
  test:
    needs: style
    runs-on: ubuntu-latest
    if: ${{ success() && (github.ref == 'refs/heads/main' || github.event_name == 'pull_request') }}
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      # When set to true, GitHub cancels all in-progress jobs if any matrix job fails.
      fail-fast: true
    name: Test 🧪 using 🐍
    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v6

        # needed for report dependencies
      - name: Prepare environment
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1 libxrender1 libxtst6

      - name: Setup uv environment 📚
        id: setup-uv-env
        uses: ./.github/actions/setup-uv-env
        with:
          python-version: ${{ matrix.python-version }}
          install-args: "--extra rna --extra report --extra tabpfn --extra clustering --group test_duration"

      #----------------------------------------------
      #              run test suite
      #----------------------------------------------
      - name: Test and generate code coverage report
        run: |
          uv run poe coverage

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: ./coverage.xml

      - name: Test mother without extra dependencies
        run: |
          uv sync --no-dev
          uv run poe dist-test

  test-slow:
    needs: test
    runs-on: ubuntu-latest
    if: ${{ success() && (github.ref == 'refs/heads/main' || github.event_name == 'pull_request') }}
    name: Test Slow 🐢 using 🐍 3.12
    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v6

        # needed for report dependencies
      - name: Prepare environment
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1 libxrender1 libxtst6

      - name: Setup uv environment 📚
        id: setup-uv-env
        uses: ./.github/actions/setup-uv-env
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          install-args: "--extra rna --extra report --extra tabpfn --extra clustering --group test_duration"

      - name: Download TabPFN checkpoint
        run: |
          uv run python examples/prepareTabpfn.py

      #----------------------------------------------
      #              run slow test suite
      #----------------------------------------------
      - name: Run slow tests
        run: |
          uv run poe test-slow

  release:
    name: Create Release package and Publish to Github
    if: success() && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip release]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set python version 🐍
        run: echo "PYTHON_VERSION=3.10" >> $GITHUB_ENV

      - name: Setup uv environment 📚
        id: setup-uv-env
        uses: ./.github/actions/setup-uv-env
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          install-args: "--extra report --extra rna --extra tabpfn"

      - name: Python Semantic Release
        uses: python-semantic-release/python-semantic-release@v10.2.0
        id: release
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      #----------------------------------------------
      #              run publish
      #----------------------------------------------
      - name: Build package
        if: steps.release.outputs.released == 'true'
        shell: bash
        run: |
          uv build

      - name: Get current version
        run: echo "version=$(uv run --with tomli python -c "import tomli; print(tomli.load(open('pyproject.toml','rb'))['project']['version'])"  )" >> $GITHUB_OUTPUT
        id: version

      - name: Get Repo Name
        id: repo-name
        run: echo "value=$(uv run --with tomli python -c "import tomli; print(tomli.load(open('pyproject.toml','rb'))['project']['name'].replace('-','_'))"  )" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: mikepenz/action-gh-release@v1 #softprops/action-gh-release
        with:
          body: ${{steps.github_release.outputs.changelog}}
          prerelease: false
          files: "./dist/${{ steps.repo-name.outputs.value }}-${{ steps.version.outputs.version }}*"
          token: ${{ github.token }}
          tag_name: "v${{ steps.version.outputs.version }}"

  build-mkdocs:
    name: Build MkDocs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1 libxrender1 libxtst6

      - name: Setup uv environment 📚
        id: setup-uv-env
        uses: ./.github/actions/setup-uv-env
        with:
          python-version: "3.10"
          install-args: "--group docs"

      - name: Build docs
        working-directory: mkdocs
        run: uv run mkdocs build

      - uses: actions/upload-artifact@v4
        with:
          name: site
          path: mkdocs/site/

  deploy-mkdocs:
    name: "Publish Docs"
    needs: build-mkdocs
    uses: bayer-int/actions-workflows/.github/workflows/publish-docs.yml@main
    with:
      artifact: site
      dir: site
      invalidate: true
      preview: ${{ github.ref != 'refs/heads/master' && github.run_id || '' }}
      namespace: ${{ github.event.repository.name }}
